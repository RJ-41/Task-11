<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .job-details {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .job-details h2 { margin-top: 0; color: #333; }
        .job-details p { margin: 6px 0; color: #555; }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { height: 100px; resize: vertical; }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover { background-color: #0056b3; }
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; display: block !important; }
        .error { background-color: #f8d7da; color: #721c24; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="job-details">
        <h2>Software Developer</h2>
        <p><strong>Company:</strong> Demo Technologies Pvt Ltd</p>
        <p><strong>Location:</strong> Hyderabad</p>
        <p><strong>Experience:</strong> 0-2 Years</p>
        <p><strong>Skills Required:</strong> Java, SQL, HTML, CSS</p>
        <p><strong>Job Description:</strong> We are looking for a passionate entry-level software engineer to build robust web systems.</p>
    </div>

    <h3>Apply Now</h3>
    <form id="applicationForm">
        <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="phoneNumber">Phone Number *</label>
            <input type="text" id="phoneNumber" required>
        </div>
        <div class="form-group">
            <label for="qualification">Qualification *</label>
            <input type="text" id="qualification" required>
        </div>
        <div class="form-group">
            <label for="experience">Years of Experience *</label>
            <input type="text" id="experience" required>
        </div>
        <div class="form-group">
            <label for="skills">Skills *</label>
            <input type="text" id="skills" placeholder="e.g., Java, SQL" required>
        </div>
        <div class="form-group">
            <label for="coverLetter">Cover Letter *</label>
            <textarea id="coverLetter" required></textarea>
        </div>
        <button type="submit">Apply Now</button>
    </form>

    <div id="message"></div>
</div>

<script src="script.js"></script>
</body>
</html>
